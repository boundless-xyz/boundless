[package]
name = "fulfillment-counter-guest"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
alloy-primitives = { version = "1.0", features = ["tiny-keccak"] }
alloy-sol-types = { version = "1.0" }
fulfillment-counter = { path = "..", default-features = false }
risc0-op-steel = { git = "https://github.com/boundless-xyz/steel", branch = "feat/multiblock" }
risc0-steel = { git = "https://github.com/boundless-xyz/steel", branch = "feat/multiblock" }
risc0-zkvm = { version = "3.0.4", default-features = false, features = ["std", "unstable"] }

# Pin alloy ecosystem to 1.6.x (RISC Zero guest toolchain is rustc 1.88; alloy 1.7+ requires 1.91)
alloy-consensus = { version = ">=1.6.3, <1.7", default-features = false }
alloy-eips = { version = ">=1.6.3, <1.7", default-features = false }
alloy-json-rpc = { version = ">=1.6.3, <1.7", default-features = false }
alloy-network-primitives = { version = ">=1.6.3, <1.7", default-features = false }
alloy-rpc-client = { version = ">=1.6.3, <1.7", default-features = false }
alloy-rpc-types-eth = { version = ">=1.6.3, <1.7", default-features = false }
alloy-serde = { version = ">=1.6.3, <1.7", default-features = false }
alloy-signer = { version = ">=1.6.3, <1.7", default-features = false }
alloy-transport = { version = ">=1.6.3, <1.7", default-features = false }
alloy-tx-macros = { version = ">=1.6.3, <1.7", default-features = false }

[patch.crates-io]
# enable RISC Zero's precompiles
blst = { git = "https://github.com/risc0/blst", tag = "v0.3.15-risczero.1" }
c-kzg = { git = "https://github.com/risc0/c-kzg-4844", tag = "c-kzg/v2.1.1-risczero.2" }
crypto-bigint = { git = "https://github.com/risc0/RustCrypto-crypto-bigint", tag = "v0.5.5-risczero.0" }
k256 = { git = "https://github.com/risc0/RustCrypto-elliptic-curves", tag = "k256/v0.13.4-risczero.1" }
sha2 = { git = "https://github.com/risc0/RustCrypto-hashes", tag = "sha2-v0.10.9-risczero.0" }
tiny-keccak = { git = "https://github.com/risc0/tiny-keccak", tag = "tiny-keccak/v2.0.2-risczero.0" }
