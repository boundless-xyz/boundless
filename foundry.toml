[profile.default]
src = "./contracts/src"
# OZ Upgrades requires the out dir to be `./out`, or for `FOUNDRY_OUT` to be set
# https://github.com/OpenZeppelin/openzeppelin-foundry-upgrades/blob/cfd861bc18ef4737e82eae6ec75304e27af699ef/src/internal/Utils.sol#L139-L147
out = "./out"
fs_permissions = [
    { access = "read", path = "./out" },
    { access = "read", path = "./contracts/out" },
    { access = "read-write", path = "./contracts/deployment.toml" },
    { access = "read", path = "./contracts/deployment_verifier.toml" },
    { access = "read-write", path = "./contracts/deployment-version-registry.toml" },
]
libs = ["./lib"]
script = "./contracts/scripts"
test = "./contracts/test"
# EVM-version-divergent imports are routed through dedicated remapping prefixes so the shanghai
# profile can swap them (see [profile.shanghai]):
#   - bytes-compat/      -> OpenZeppelin Bytes (mcopy) here; a no-mcopy shim under shanghai
#   - boundless-market/  -> the transient-storage market here; a persistent-storage variant under
#                           shanghai (the market is the one contract whose body must differ)
# Defined here in config rather than remappings.txt because a profile cannot override a
# remappings.txt entry. Profiles that compile contracts/src but do not set their own `remappings`
# (povw-deploy, reference-contract, deployment-test) inherit these from the default profile.
remappings = [
    "bytes-compat/=lib/openzeppelin-contracts/contracts/utils/",
    "boundless-market/=contracts/src/",
]
ffi = true
evm_version = 'cancun'
via_ir = true
optimizer = true
# Use 100 runs only to reduce contract size.
optimizer_runs = 100
ast = true
build_info = true
extra_output = ["storageLayout"]
gas_reports = ["BoundlessMarket"]
solc_version = "0.8.26"
# Do not append metadata hash to bytecode. We do not currently use it, and omitting it results in
# more stable build artifacts, which is important since we check the bytecode into git.
# For information about Solidity metadata, see https://docs.soliditylang.org/en/latest/metadata.html
bytecode_hash = "none"
snapshots = "contracts/snapshots"
isolate = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
ignore = ["contracts/src/blake3-groth16/Groth16Verifier.sol"]

[lint]
exclude_lints = ["asm-keccak256", "incorrect-shift"]

# Profile used to run deployment tests, which check the correctness of contracts as deployed.
# TIP: You can select this profile by setting env var FOUNDRY_PROFILE=deployment-test
[profile.deployment-test]
test = "contracts/deployment-test"
#match_path = "contracts/deployment-test/*"
fs_permissions = [
    { access = "read", path = "contracts/deployment.toml" },
    { access = "read", path = "contracts/deployment_verifier.toml" },
]
isolate = true

# Profile used for deploying PoVW contracts with higher optimization
# TIP: You can select this profile by setting env var FOUNDRY_PROFILE=povw-deploy
[profile.povw-deploy]
src = "./contracts/src"
out = "./out"
fs_permissions = [
    { access = "read", path = "./out" },
    { access = "read", path = "./contracts/out" },
    { access = "read-write", path = "./contracts/deployment.toml" },
]
libs = ["./lib"]
script = "./contracts/scripts"
test = "./contracts/test"
ffi = true
evm_version = 'cancun'
via_ir = true
optimizer = true
# Use higher optimization runs for PoVW deployments to reduce gas costs
optimizer_runs = 1000000
ast = true
build_info = true
extra_output = ["storageLayout"]
solc_version = "0.8.26"
bytecode_hash = "none"
isolate = true

# Profile used to run upgradeability tests.
# TIP: You can select this profile by setting env vars FOUNDRY_PROFILE=reference-contract and FOUNDRY_OUT="contracts/reference-contract/out"
[profile.reference-contract]
src = "contracts/src"
out = "contracts/reference-contract/out"
test = "contracts/reference-contract/test"
libs = ["lib"]
ffi = true
ast = true
build_info = true
extra_output = ["storageLayout"]
fs_permissions = [
    { access = "read", path = "contracts/reference-contract/out" },
]

# Profile for the Shanghai-compatible contract variant (no tstore/tload/mcopy).
# Compiles the SAME ./contracts/src tree as the default profile, except the EVM-version-divergent
# files, which are swapped via the remappings below:
#   - bytes-compat/      -> contracts/shanghai/compat/Bytes.sol (no mcopy)
#   - boundless-market/  -> contracts/shanghai/variants/BoundlessMarket.sol (persistent storage +
#                           explicit FulfillmentContext.clear, importing the sstore variant)
# The Cancun-only originals (the transient-storage market + its FulfillmentContext) are skipped so
# they aren't compiled under the Shanghai EVM. The mainline legacy tree is Cancun-only and frozen;
# it is skipped here too (Taiko carries its own frozen legacy under contracts/shanghai/legacy).
# TIP: You can select this profile by setting env var FOUNDRY_PROFILE=shanghai
[profile.shanghai]
src = "./contracts/src"
out = "./out-shanghai"
libs = ["./lib"]
script = "./contracts/shanghai/scripts"
test = "./contracts/shanghai/test"
remappings = [
    "bytes-compat/=contracts/shanghai/compat/",
    "boundless-market/=contracts/shanghai/variants/",
]
skip = [
    "contracts/src/legacy/**",
    "contracts/src/BoundlessMarket.sol",
    "contracts/src/types/FulfillmentContext.sol",
]
ffi = true
evm_version = 'shanghai'
via_ir = true
optimizer = true
optimizer_runs = 100
ast = true
build_info = true
extra_output = ["storageLayout"]
solc_version = "0.8.26"
bytecode_hash = "none"
isolate = true
fs_permissions = [
    { access = "read", path = "./out-shanghai" },
    { access = "read", path = "./contracts/out" },
    { access = "read-write", path = "./contracts/deployment.toml" },
    { access = "read", path = "./contracts/deployment_verifier.toml" },
]
