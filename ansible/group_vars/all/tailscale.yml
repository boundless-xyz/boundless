---
# Tailscale Configuration
tailscale_install: false # Set to true to install Tailscale
tailscale_auth_key: "" # Required if tailscale_install is true - pre-auth key from Tailscale admin console
tailscale_service_enabled: true
tailscale_service_state: started
tailscale_advertise_routes: [] # List of CIDR routes to advertise (e.g., ["10.0.0.0/8"])
tailscale_advertise_exit_node: false # Advertise this node as an exit node
tailscale_advertise_tags: [] # List of ACL tags (e.g., ["tag:servers"])
tailscale_hostname: "{{ inventory_hostname }}" # Hostname in Tailscale network
tailscale_accept_routes: false # Accept routes advertised by other nodes
tailscale_shields_up: true # Enable shields up (block incoming connections)
