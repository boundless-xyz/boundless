name: Docker Services

on:
  push:
    branches: [main]
    paths:
      - "dockerfiles/**"
      - "crates/**"
      - "contracts/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "foundry.toml"
      - "blake3_groth16/**"
    tags: ["infra-v*"]
  pull_request:
    paths:
      - "dockerfiles/**"
      - "crates/**"
      - "contracts/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "foundry.toml"
      - "blake3_groth16/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: [self-hosted, prod, Linux, cpu]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: slasher
            dockerfile: dockerfiles/slasher.dockerfile
          - name: order-stream
            dockerfile: dockerfiles/order_stream.dockerfile
          - name: indexer
            dockerfile: dockerfiles/indexer.dockerfile
          - name: distributor
            dockerfile: dockerfiles/distributor.dockerfile
          - name: order-generator
            dockerfile: dockerfiles/order_generator.dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=infra-v(.*),group=1
            type=ref,event=pr

      - name: Fetch sccache AWS creds
        id: sccache-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: "us-west-2"
          role-duration-seconds: 14400
          role-to-assume: "arn:aws:iam::033359631619:role/gha_oidc_boundless_cache_public_access"
          output-credentials: true

      - name: Create sccache creds file for Docker build
        run: |
          echo "[default]" > ./dockerfiles/ci-cache-creds.txt
          echo "aws_access_key_id=${{ steps.sccache-creds.outputs.aws-access-key-id }}" >> ./dockerfiles/ci-cache-creds.txt
          echo "aws_secret_access_key=${{ steps.sccache-creds.outputs.aws-secret-access-key }}" >> ./dockerfiles/ci-cache-creds.txt
          echo "aws_session_token=${{ steps.sccache-creds.outputs.aws-session-token }}" >> ./dockerfiles/ci-cache-creds.txt

      - name: Fetch BuildKit cache AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: "us-west-2"
          role-duration-seconds: 14400
          role-to-assume: "arn:aws:iam::083632199359:role/gha_oidc_risc0_cache_shared_access"

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            S3_CACHE_BUCKET=boundless-ci-prod-cache
            S3_CACHE_PREFIX=public/boundless/rust-cache-docker-Linux-X64/sccache
          cache-from: type=s3,name=${{ matrix.service.name }}-cache,manifests_prefix=shared/boundless/docker/manifests/,blobs_prefix=shared/boundless/docker/blobs/,region=us-west-2,bucket=risc0-ci-cache
          cache-to: type=s3,name=${{ matrix.service.name }}-cache,manifests_prefix=shared/boundless/docker/manifests/,blobs_prefix=shared/boundless/docker/blobs/,region=us-west-2,bucket=risc0-ci-cache,mode=max
          secret-files: |
            ci_cache_creds=./dockerfiles/ci-cache-creds.txt
