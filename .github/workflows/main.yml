name: Main workflow

on:
  pull_request:
    branches:
      - main
      - "release-*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  RISC0_TOOLCHAIN_VERSION: 1.88.0
  RISC0_CRATE_VERSION: "3.0.3"
  RISC0_CPP_VERSION: "2024.1.5"
  RISC0_GROTH16_VERSION: "0.1.0"
  FOUNDRY_VERSION: v1.5.0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  main-status-check:
    if: always()
    timeout-minutes: 5
    needs:
      - rust-lint
      - rust-test
      - rust-doctest
      - link-check
      - fmt
      - foundry
      - docker
      - infra
      - scaler-tests
      - validate-requestor-lists
      - check-publish
      - docs-rs
    runs-on: ubuntu-latest
    steps:
      - name: Check all job status
        # see https://docs.github.com/en/actions/reference/context-and-expression-syntax-for-github-actions#needs-context
        # see https://stackoverflow.com/a/67532120/4907315
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

  rust-lint:
    runs-on: [self-hosted, prod, Linux, cpu]
    timeout-minutes: 20
    needs: [files-changed]
    if: needs.files-changed.outputs.main == 'true' || needs.files-changed.outputs.docs == 'true'
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule cache key
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD -- lib/ | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache submodules
        id: submodule-cache
        uses: actions/cache@v4
        with:
          path: lib/
          key: submodules-${{ steps.submodule-key.outputs.hash }}

      - name: checkout submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth=1 --jobs=8

      - name: Install Rust linker toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils lld mold

      - name: setup sccache + s3
        uses: ./.github/actions/sccache

      - uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          toolchain: ${{ env.RISC0_TOOLCHAIN_VERSION }}
          components: clippy

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Cache forge build
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: forge-build-${{ runner.os }}-${{ hashFiles('contracts/src/**', 'foundry.toml') }}
          restore-keys: forge-build-${{ runner.os }}-

      - name: forge build
        run: forge build

      - name: cargo clippy
        env:
          RUSTFLAGS: "-Dwarnings"
          RISC0_SKIP_BUILD: 1
          RISC0_SKIP_BUILD_KERNELS: 1
        run: cargo clippy --locked --all-targets

      - name: cargo doc
        env:
          RUSTFLAGS: "-Dwarnings"
          RISC0_SKIP_BUILD: 1
          RISC0_SKIP_BUILD_KERNELS: 1
        run: cargo doc --locked --no-deps

        # build script for boundless-market copies Solidity build artifacts.
        # check that these are not modified, which would indicate they need to be updated.
      - name: check for changes to files in git index
        run: git diff --exit-code -- crates/boundless-market/src/contracts/artifacts

      - name: sccache stats
        run: sccache --show-stats

  rust-test:
    runs-on: [self-hosted, prod, Linux, cpu]
    timeout-minutes: 20
    needs: [files-changed]
    if: needs.files-changed.outputs.main == 'true'
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    services:
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: password
        options: >-
          --shm-size=2gb
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Configure PostgreSQL max_connections
        run: |
          POSTGRES_CONTAINER=$(docker ps --filter "ancestor=postgres:latest" --format "{{.ID}}")
          docker exec $POSTGRES_CONTAINER psql -U postgres -c "ALTER SYSTEM SET max_connections = 500;"
          docker restart $POSTGRES_CONTAINER
          until docker exec $POSTGRES_CONTAINER pg_isready; do
            sleep 1
          done

      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule cache key
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD -- lib/ | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache submodules
        id: submodule-cache
        uses: actions/cache@v4
        with:
          path: lib/
          key: submodules-${{ steps.submodule-key.outputs.hash }}

      - name: checkout submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth=1 --jobs=8

      - name: Install Rust linker toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils lld mold

      - name: setup sccache + s3
        uses: ./.github/actions/sccache

      - uses: risc0/risc0/.github/actions/rustup@v3.0.3
      - uses: risc0/risc0/.github/actions/protoc@v3.0.3

      - name: install cargo risczero
        uses: ./.github/actions/bininstall-risc0
        with:
          risczero-version: ${{ env.RISC0_CRATE_VERSION }}
          toolchain-version: ${{ env.RISC0_TOOLCHAIN_VERSION }}
          cpp-version: ${{ env.RISC0_CPP_VERSION }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Cache forge build
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: forge-build-${{ runner.os }}-${{ hashFiles('contracts/src/**', 'foundry.toml') }}
          restore-keys: forge-build-${{ runner.os }}-

      - name: forge build
        run: forge build

      - name: install cargo-binstall
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-binstall

      - name: install nextest
        run: cargo binstall -y cargo-nextest@0.9.128

      - name: cargo nextest run
        run: cargo nextest run --locked --workspace --all-targets --features test-r0vm,test-rpc --partition count:${{ matrix.partition }}/3
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/postgres
          RISC0_DEV_MODE: true
          ETH_MAINNET_RPC_URL: ${{ secrets.ETH_MAINNET_RPC_URL_FREE_TIER }}
          BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL_FREE_TIER }}

      - name: sccache stats
        run: sccache --show-stats

  rust-doctest:
    runs-on: [self-hosted, prod, Linux, cpu]
    timeout-minutes: 10
    needs: [files-changed]
    if: needs.files-changed.outputs.docs == 'true'
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule cache key
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD -- lib/ | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache submodules
        id: submodule-cache
        uses: actions/cache@v4
        with:
          path: lib/
          key: submodules-${{ steps.submodule-key.outputs.hash }}

      - name: checkout submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth=1 --jobs=8

      - name: Install Rust linker toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils lld mold

      - name: setup sccache + s3
        uses: ./.github/actions/sccache

      - uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          toolchain: ${{ env.RISC0_TOOLCHAIN_VERSION }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Cache forge build
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: forge-build-${{ runner.os }}-${{ hashFiles('contracts/src/**', 'foundry.toml') }}
          restore-keys: forge-build-${{ runner.os }}-

      - name: forge build
        run: forge build

      - name: cargo test (doctests)
        run: cargo test --locked --doc --features test-r0vm,test-rpc
        env:
          RISC0_DEV_MODE: true
          RISC0_SKIP_BUILD: 1
          RISC0_SKIP_BUILD_KERNELS: 1

      - name: sccache stats
        run: sccache --show-stats

  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: files-changed
    if: needs.files-changed.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: restore lychee cache
        id: restore-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/lychee
          key: lychee-${{ runner.os }}-v1
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: install cargo-binstall
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-binstall

      - name: install lychee
        run: cargo binstall -y lychee@0.15.1

      - name: run lychee
        # lychee does not respect the .gitignore natively
        # https://github.com/lycheeverse/lychee/issues/470#issuecomment-1094690229
        # don't run on `documentation` folder, it has it's own checker for links
        run: |
          git ls-files '*.md' ':!:documentation/*' \
            | xargs lychee \
                --base . \
                --cache \
                --max-concurrency 2 \
                --max-retries 6 \
                --retry-wait-time 2 \
                --timeout 20 \
                --accept 429 \
                --

      - name: save lychee cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/lychee
          key: lychee-${{ runner.os }}-v1

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          # Full history is required by license-check.py
          fetch-depth: 0

      - name: install python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          toolchain: stable
          components: rustfmt

      - name: install cargo-binstall
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-binstall

      - name: install dprint
        run: cargo binstall -y dprint@0.47.2

      - name: install cargo-sort
        run: cargo binstall -y cargo-sort@2

      - name: cargo sort
        run: cargo sort --workspace --check

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: license check
        run: python license-check.py

      - name: dprint check
        run: dprint check

  foundry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: files-changed
    if: needs.files-changed.outputs.main == 'true'
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule cache key
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD -- lib/ | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache submodules
        id: submodule-cache
        uses: actions/cache@v4
        with:
          path: lib/
          key: submodules-${{ steps.submodule-key.outputs.hash }}

      - name: checkout submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth=1 --jobs=8

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: forge fmt
        run: forge fmt --check
        working-directory: contracts

      - name: Cache forge build
        uses: actions/cache@v4
        with:
          path: |
            out
            cache
          key: forge-test-${{ runner.os }}-${{ hashFiles('contracts/src/**', 'contracts/test/**', 'foundry.toml') }}
          restore-keys: forge-test-${{ runner.os }}-

      - name: forge test
        run: forge test -vvv
        working-directory: contracts

  # Check that cargo publish can package the boundless-market crate.
  # Does not install Forge or cargo-risczero — only needs Rust sources and contracts/src/.
  check-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: files-changed
    if: needs.files-changed.outputs.main == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: setup sccache + s3
        uses: ./.github/actions/sccache
      - name: cache sccache local disk
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-check-publish-${{ hashFiles('Cargo.lock') }}
          restore-keys: sccache-check-publish-
      - name: Install Rust linker toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils lld mold
      - uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          toolchain: ${{ env.RISC0_TOOLCHAIN_VERSION }}
      - name: cache cargo registry and git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-check-publish-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-check-publish-
      # TODO: Add dry-run publish checks for other crates; difficulty is they all depend on boundless-market being published
      - run: cargo publish -p boundless-market --dry-run
      - name: sccache stats
        run: sccache --show-stats

  # Run as a separate job because it needs the nightly toolchain and does not install Forge or cargo-risczero.
  docs-rs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: files-changed
    if: needs.files-changed.outputs.main == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust linker toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils lld mold
      - name: setup sccache + s3
        uses: ./.github/actions/sccache
      - name: cache sccache local disk
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-docs-rs-nightly-2025-05-09-${{ hashFiles('Cargo.lock') }}
          restore-keys: sccache-docs-rs-nightly-2025-05-09-
      - uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          # Building with docs.rs config requires the nightly toolchain.
          toolchain: nightly-2025-05-09
      - name: cache cargo registry and git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-docs-rs-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-docs-rs-
      - run: cargo +nightly-2025-05-09 doc -p boundless-market --all-features --no-deps
        env:
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"
      - name: sccache stats
        run: sccache --show-stats

  docker:
    runs-on: [self-hosted, prod, "${{ matrix.os }}", "${{ matrix.device }}"]
    timeout-minutes: 30
    strategy:
      # Run only on Linux with CPU.
      matrix:
        include:
          - os: Linux
            feature: default
            device: cpu
    needs: files-changed
    if: needs.files-changed.outputs.docker == 'true'
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule cache key
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD -- lib/ | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache submodules
        id: submodule-cache
        uses: actions/cache@v4
        with:
          path: lib/
          key: submodules-${{ steps.submodule-key.outputs.hash }}

      - name: checkout submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth=1 --jobs=8

      - name: Login to Docker Hub
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_CI_USER }}
          password: ${{ secrets.DOCKERHUB_CI_PAT }}

      - name: docker-compose lint
        run: docker compose --profile broker --env-file ./.env.broker-template config

      - name: Fetch CI AWS Creds
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: "us-west-2"
          role-duration-seconds: 14400
          role-to-assume: "arn:aws:iam::083632199359:role/gha_oidc_risc0_cache_shared_access"
          output-credentials: true

      - name: create ci creds file
        run: |
          echo "[default]" > ./dockerfiles/ci-cache-creds.txt
          echo "aws_access_key_id=${{ steps.aws-creds.outputs.aws-access-key-id }}" >> ./dockerfiles/ci-cache-creds.txt && \
          echo "aws_secret_access_key=${{ steps.aws-creds.outputs.aws-secret-access-key }}" >> ./dockerfiles/ci-cache-creds.txt && \
          echo "aws_session_token=${{ steps.aws-creds.outputs.aws-session-token }}" >> ./dockerfiles/ci-cache-creds.txt

      - name: Setup docker builder
        run: docker buildx create --driver docker-container --use

      - name: docker compose build
        run: docker compose --profile broker --env-file ./.env.broker-template -f compose.yml -f ./dockerfiles/compose.ci.yml build

  infra:
    runs-on: [self-hosted, prod, "${{ matrix.os }}", "${{ matrix.device }}"]
    timeout-minutes: 5
    strategy:
      # Run only on Linux with CPU.
      matrix:
        include:
          - os: Linux
            feature: default
            device: cpu
    needs: files-changed
    if: needs.files-changed.outputs.infra == 'true'
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history

      - name: Install Pulumi
        uses: pulumi/setup-pulumi@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run build for changed packages
        run: |
          for file in $(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }} | grep "^infra/"); do
            # Get the package directory (infra/<dir> where package.json is located)
            package_dir=$(echo "$file" | cut -d'/' -f1-2)
            if [ -f "$package_dir/package.json" ]; then
              echo "Building package in $package_dir"
              cd "$package_dir"
              npm install
              npm run build
              cd -
            fi
          done

  scaler-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: files-changed
    if: needs.files-changed.outputs.scaler == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd infra/scaler
          pip install -r requirements.txt

      - name: Run pytest tests
        run: |
          cd infra/scaler
          pytest -v

  validate-requestor-lists:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: files-changed
    if: needs.files-changed.outputs.requestor_lists == 'true'
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: validate JSON files in requestor-lists
        run: |
          for file in requestor-lists/*.json; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              if ! python3 -m json.tool "$file" > /dev/null; then
                echo "ERROR: Invalid JSON in $file"
                exit 1
              fi
              echo "✓ $file is valid JSON"
            fi
          done

  files-changed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docker: ${{ steps.changes.outputs.docker }}
      main: ${{ steps.changes.outputs.main }}
      docs: ${{ steps.changes.outputs.docs }}
      infra: ${{ steps.changes.outputs.infra }}
      scaler: ${{ steps.changes.outputs.scaler }}
      requestor_lists: ${{ steps.changes.outputs.requestor_lists }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3.0.0
        id: changes
        with:
          filters: |
            # Changes to Docker files. Only triggers for files used by the broker build.
            docker:
              - 'dockerfiles/**'
              - '!dockerfiles/market-indexer.dockerfile'
              - '!dockerfiles/market-indexer-backfill.dockerfile'
              - '!dockerfiles/market-efficiency-indexer.dockerfile'
              - '!dockerfiles/rewards-indexer.dockerfile'
              - '!dockerfiles/order_stream.dockerfile'
              - '!dockerfiles/order_generator.dockerfile'
              - '!dockerfiles/slasher.dockerfile'
              - '!dockerfiles/distributor.dockerfile'
              - 'compose.yml'
              - '.env.broker-template'
            # Changes affect the main codebase (rust + contracts).
            main:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'foundry.toml'
              - 'remappings.txt'
              - 'rustfmt.toml'
              - 'crates/**'
              - 'contracts/**'
              - 'blake3_groth16/**'
              - 'lib/**'
              - '.github/workflows/main.yml'
            docs:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'crates/**'
              - 'contracts/**'
              - 'documentation/**'
              - '.github/workflows/main.yml'
            # Changes to infrastructure code
            infra:
              - 'infra/**'
              - '.github/workflows/main.yml'
            # Changes to scaler lambda function
            scaler:
              - 'infra/scaler/**'
              - '.github/workflows/main.yml'
            # Changes to requestor lists
            requestor_lists:
              - 'requestor-lists/**'
              - '.github/workflows/main.yml'
