name: Build and Release Broker

on:
  push:
    tags:
      - 'broker-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., broker-v1.0.0)'
        required: true
        default: 'broker-v1.0.0'
      dry_run:
        description: 'Dry run (build only, no release)'
        required: false
        default: 'false'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  extract-binaries:
    name: Extract Broker Binary from Docker Image
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Docker Services workflow to complete
        run: |
          echo "Waiting for docker-services workflow to push nightly-${{ steps.sha.outputs.short_sha }} images..."
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}
          IMAGE=${{ env.IMAGE_PREFIX }}/broker:nightly-${SHORT_SHA}
          for i in $(seq 1 60); do
            if docker pull "$IMAGE" > /dev/null 2>&1; then
              echo "Image $IMAGE is available"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Timed out waiting for $IMAGE"
              exit 1
            fi
            echo "Attempt $i/60: Image not yet available, waiting 30s..."
            sleep 30
          done

      - name: Extract broker binary from Docker image
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}

          docker create --name tmp-broker ${{ env.IMAGE_PREFIX }}/broker:nightly-${SHORT_SHA}
          docker cp tmp-broker:/app/broker ./broker
          docker rm tmp-broker

          sha256sum broker > broker.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: broker-binaries-linux-amd64
          path: |
            broker
            broker.sha256
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: extract-binaries
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/broker-v') && github.event.inputs.dry_run != 'true'
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: broker-binaries-linux-amd64
          path: release-assets

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_name=Broker Release $VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PRERELEASE_FLAG=""
          if [[ "${{ steps.get_version.outputs.is_rc }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$VERSION" \
            $PRERELEASE_FLAG \
            --title "${{ steps.get_version.outputs.release_name }}" \
            --notes "## Broker Release

          - **Broker**: Core broker service for order management

          ### Installation
          \`\`\`bash
          chmod +x broker
          ./broker --help
          \`\`\`

          ### Verification
          Verify the integrity using the provided SHA256 checksum." \
            ./release-assets/*

  retag-docker:
    name: Retag Docker Image
    needs: create-release
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          VERSION_UNPREFIXED=${VERSION#broker-}
          echo "version_unprefixed=$VERSION_UNPREFIXED" >> $GITHUB_OUTPUT
          # Only compute minor versions and latest tag for non-RC tags
          if [[ "$VERSION" != *"-rc."* ]]; then
            echo "minor_version=$(echo "$VERSION" | sed 's/\.[0-9]*$//')" >> $GITHUB_OUTPUT
            echo "minor_version_unprefixed=$(echo "$VERSION_UNPREFIXED" | sed 's/\.[0-9]*$//')" >> $GITHUB_OUTPUT
            echo "latest=latest" >> $GITHUB_OUTPUT
          fi
          # Short SHA for matching the nightly image tag
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Retag broker image
        run: |
          SRC=ghcr.io/${{ github.repository }}/broker:nightly-${{ steps.get_version.outputs.short_sha }}
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "${{ steps.get_version.outputs.latest }}"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done
