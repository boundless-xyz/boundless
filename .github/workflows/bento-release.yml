name: Build and Release Bento Components

on:
  push:
    tags:
      - 'bento-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., bento-v1.0.0)'
        required: true
        default: 'bento-v1.0.0'
      dry_run:
        description: 'Dry run (build only, no release)'
        required: false
        default: 'false'

env:
  RISC0_TOOLCHAIN_VERSION: 1.88.0
  RISC0_CRATE_VERSION: "3.0.3"
  RUST_VERSION: "1.88.0"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-bento:
    name: Build Bento Components
    runs-on: ubuntu-latest
    # runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read    # Required for checkout
      id-token: write   # Required for OIDC authentication with AWS
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            os: linux
            arch: x64
            artifact_name: linux-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install deps
        run: |
          # Add NVIDIA repository and install drivers
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev binutils lld mold cuda-toolkit-13-0 nvidia-open


          # Temporary installations while using the default ubuntu-latest runner. Remove if using self-hosted AMI
          sudo apt-get -y install clang curl git-lfs iptables libssl-dev pkg-config uidmap wget zstd cmake tree zlib1g-dev

          # Debug PATH and verify tools
          echo "=== PATH Debug ==="
          echo "PATH: $PATH"
          echo "=== Tool Locations ==="
          which gcc || echo "gcc not found"
          which cc || echo "cc not found"
          which nvcc || echo "nvcc not found"
          echo "=== CUDA Paths ==="
          ls -la /usr/local/cuda/bin/ || echo "CUDA bin not found"
          ls -la /usr/bin/gcc || echo "System gcc not found"

      # - name: setup sccache + s3
      #   uses: ./.github/actions/sccache

      - name: Setup Rust toolchain
        uses: risc0/risc0/.github/actions/rustup@v3.0.3
        with:
          toolchain: ${{ env.RISC0_TOOLCHAIN_VERSION }}

      - name: Install protoc
        uses: risc0/risc0/.github/actions/protoc@v3.0.3

      - name: Install cargo risczero
        uses: ./.github/actions/bininstall-risc0
        with:
          risczero-version: ${{ env.RISC0_CRATE_VERSION }}
          toolchain-version: ${{ env.RISC0_TOOLCHAIN_VERSION }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bento/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Bento Components Bundle
        working-directory: bento
        env:
          CUDA_PATH: /usr/local/cuda
          CUDA_HOME: /usr/local/cuda
          PATH: /usr/local/cuda/bin:/usr/bin:/usr/local/bin:/home/runner/.cargo/bin:$PATH
          LD_LIBRARY_PATH: /usr/local/cuda/lib64:$LD_LIBRARY_PATH
          NVCC_APPEND_FLAGS: "--generate-code arch=compute_75,code=sm_75 --generate-code arch=compute_80,code=sm_80 --generate-code arch=compute_86,code=sm_86 --generate-code arch=compute_89,code=sm_89 --generate-code arch=compute_120,code=sm_120"
          SCCACHE_CUDA: "1"
          SCCACHE_CUDA_COMPILER: "nvcc"
          SCCACHE_CUDA_INCLUDE: "/usr/local/cuda/include"
          SCCACHE_CUDA_LIB: "/usr/local/cuda/lib64"
        run: |
          # Build all components
          cargo build --release --target ${{ matrix.target }} -F cuda --bin agent
          cargo build --release --target ${{ matrix.target }} --bin rest_api
          cargo build --release --target ${{ matrix.target }} --bin bento_cli

          # Create bundle directory in workspace root
          mkdir -p ../binaries/${{ matrix.artifact_name }}/bento-bundle

          # Copy all components to bundle
          cp target/${{ matrix.target }}/release/agent ../binaries/${{ matrix.artifact_name }}/bento-bundle/bento-agent
          cp target/${{ matrix.target }}/release/rest_api ../binaries/${{ matrix.artifact_name }}/bento-bundle/bento-rest-api
          cp target/${{ matrix.target }}/release/bento_cli ../binaries/${{ matrix.artifact_name }}/bento-bundle/bento-cli

          # Create bundle archive
          cd ../binaries/${{ matrix.artifact_name }}
          tar -czf bento-bundle-${{ matrix.artifact_name }}.tar.gz bento-bundle/
          rm -rf bento-bundle/

      # - name: sccache stats
      #   run: sccache --show-stats

      - name: Create checksums
        working-directory: binaries/${{ matrix.artifact_name }}
        run: |
          sha256sum bento-bundle-${{ matrix.artifact_name }}.tar.gz > bento-bundle-${{ matrix.artifact_name }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bento-binaries-${{ matrix.artifact_name }}
          path: binaries/${{ matrix.artifact_name }}
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-bento
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/bento-v') && github.event.inputs.dry_run != 'true'
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for artifact in artifacts/bento-binaries-*; do
            if [ -d "$artifact" ]; then
              cp -r "$artifact"/* release-assets/
            fi
          done
          ls -la release-assets/

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_name=Bento Release $VERSION" >> $GITHUB_OUTPUT
          # Detect RC version
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PRERELEASE_FLAG=""
          if [[ "${{ steps.get_version.outputs.is_rc }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$VERSION" \
            $PRERELEASE_FLAG \
            --title "${{ steps.get_version.outputs.release_name }}" \
            --notes "## Bento Components Release

          This release includes a complete bundle of Bento components:
          - **Bento Agent**: Workflow execution agent (with CUDA support)
          - **Bento REST API**: REST API server
          - **Bento Client**: Client library

          ### Supported Platforms
          - Linux AMD64

          ### Installation
          Download the appropriate bundle for your platform and extract:
          \`\`\`bash
          # Download and extract
          tar -xzf bento-bundle-linux-amd64.tar.gz
          cd bento-bundle

          # Make executables
          chmod +x bento-agent
          chmod +x bento-rest-api
          chmod +x bento-client
          \`\`\`

          ### Usage
          \`\`\`bash
          # Run agent
          ./bento-agent --help

          # Run REST API
          ./bento-rest-api --help

          # Run client
          ./bento-client --help
          \`\`\`

          ### Verification
          Verify the integrity of downloaded bundles using the provided SHA256 checksums." \
            ./release-assets/*

  retag-docker:
    name: Retag Docker Images
    needs: create-release
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          VERSION_UNPREFIXED=${VERSION#bento-}
          echo "version_unprefixed=$VERSION_UNPREFIXED" >> $GITHUB_OUTPUT
          # Only compute minor versions for non-RC tags
          if [[ "$VERSION" != *"-rc."* ]]; then
            echo "minor_version=$(echo "$VERSION" | sed 's/\.[0-9]*$//')" >> $GITHUB_OUTPUT
            echo "minor_version_unprefixed=$(echo "$VERSION_UNPREFIXED" | sed 's/\.[0-9]*$//')" >> $GITHUB_OUTPUT
          fi

      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Retag bento-agent image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-agent:nightly-latest
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done

      - name: Retag bento-agent-cpu image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-agent-cpu:nightly-latest
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done

      - name: Retag bento-rest-api image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-rest-api:nightly-latest
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done

      - name: Retag bento-cli image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-cli:nightly-latest
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done
