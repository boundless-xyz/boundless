name: Build and Release Bento Components

on:
  push:
    tags:
      - 'bento-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., bento-v1.0.0)'
        required: true
        default: 'bento-v1.0.0'
      dry_run:
        description: 'Dry run (build only, no release)'
        required: false
        default: 'false'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  extract-binaries:
    name: Extract Binaries from Docker Images
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Docker Services workflow to complete
        run: |
          echo "Waiting for docker-services workflow to push nightly-${{ steps.sha.outputs.short_sha }} images..."
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}
          IMAGE=${{ env.IMAGE_PREFIX }}/bento-agent:nightly-${SHORT_SHA}
          for i in $(seq 1 60); do
            if docker pull "$IMAGE" > /dev/null 2>&1; then
              echo "Image $IMAGE is available"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Timed out waiting for $IMAGE"
              exit 1
            fi
            echo "Attempt $i/60: Image not yet available, waiting 30s..."
            sleep 30
          done

      - name: Extract binaries from Docker images
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}
          mkdir -p bento-bundle

          # Extract agent binary from GPU agent image (already pulled above)
          docker create --name tmp-agent ${{ env.IMAGE_PREFIX }}/bento-agent:nightly-${SHORT_SHA}
          docker cp tmp-agent:/app/agent bento-bundle/bento-agent
          docker rm tmp-agent

          # Extract rest_api binary
          docker pull ${{ env.IMAGE_PREFIX }}/bento-rest-api:nightly-${SHORT_SHA}
          docker create --name tmp-rest-api ${{ env.IMAGE_PREFIX }}/bento-rest-api:nightly-${SHORT_SHA}
          docker cp tmp-rest-api:/app/rest_api bento-bundle/bento-rest-api
          docker rm tmp-rest-api

          # Extract bento_cli binary
          docker pull ${{ env.IMAGE_PREFIX }}/bento-cli:nightly-${SHORT_SHA}
          docker create --name tmp-cli ${{ env.IMAGE_PREFIX }}/bento-cli:nightly-${SHORT_SHA}
          docker cp tmp-cli:/app/bento_cli bento-bundle/bento-cli
          docker rm tmp-cli

          # Create bundle archive
          tar -czf bento-bundle-linux-amd64.tar.gz bento-bundle/
          sha256sum bento-bundle-linux-amd64.tar.gz > bento-bundle-linux-amd64.tar.gz.sha256
          rm -rf bento-bundle/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bento-binaries-linux-amd64
          path: |
            bento-bundle-linux-amd64.tar.gz
            bento-bundle-linux-amd64.tar.gz.sha256
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: extract-binaries
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/bento-v') && github.event.inputs.dry_run != 'true'
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bento-binaries-linux-amd64
          path: release-assets

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_name=Bento Release $VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PRERELEASE_FLAG=""
          if [[ "${{ steps.get_version.outputs.is_rc }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$VERSION" \
            $PRERELEASE_FLAG \
            --title "${{ steps.get_version.outputs.release_name }}" \
            --notes "## Bento Components Release

          This release includes a complete bundle of Bento components:
          - **Bento Agent**: Workflow execution agent (with CUDA support)
          - **Bento REST API**: REST API server
          - **Bento CLI**: CLI tool

          ### Supported Platforms
          - Linux AMD64

          ### Installation
          Download the appropriate bundle for your platform and extract:
          \`\`\`bash
          tar -xzf bento-bundle-linux-amd64.tar.gz
          cd bento-bundle
          chmod +x bento-agent bento-rest-api bento-cli
          \`\`\`

          ### Verification
          Verify the integrity of downloaded bundles using the provided SHA256 checksums." \
            ./release-assets/*

  retag-docker:
    name: Retag Docker Images
    needs: create-release
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version and commit SHA
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          VERSION_UNPREFIXED=${VERSION#bento-}
          echo "version_unprefixed=$VERSION_UNPREFIXED" >> $GITHUB_OUTPUT
          # Only compute minor versions for non-RC tags
          if [[ "$VERSION" != *"-rc."* ]]; then
            echo "minor_version=$(echo "$VERSION" | sed 's/\.[0-9]*$//')" >> $GITHUB_OUTPUT
            echo "minor_version_unprefixed=$(echo "$VERSION_UNPREFIXED" | sed 's/\.[0-9]*$//')" >> $GITHUB_OUTPUT
          fi
          # Short SHA for matching the nightly image tag
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Retag bento-agent image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-agent:nightly-${{ steps.get_version.outputs.short_sha }}
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done

      - name: Retag bento-agent-cpu image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-agent-cpu:nightly-${{ steps.get_version.outputs.short_sha }}
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done

      - name: Retag bento-rest-api image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-rest-api:nightly-${{ steps.get_version.outputs.short_sha }}
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done

      - name: Retag bento-cli image
        run: |
          SRC=ghcr.io/${{ github.repository }}/bento-cli:nightly-${{ steps.get_version.outputs.short_sha }}
          for TAG in \
            "${{ steps.get_version.outputs.version }}" \
            "${{ steps.get_version.outputs.version_unprefixed }}" \
            "${{ steps.get_version.outputs.minor_version }}" \
            "${{ steps.get_version.outputs.minor_version_unprefixed }}" \
            "latest"; do
            [ -n "$TAG" ] && crane tag "$SRC" "$TAG"
          done
