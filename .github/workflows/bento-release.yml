name: Build and Release Components

on:
  push:
    tags:
      - 'bento-v*'
      - 'prover-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., bento-v1.0.0 or prover-v1.0.0)'
        required: true
        default: 'prover-v1.0.0'
      dry_run:
        description: 'Dry run (build only, no release)'
        required: false
        default: 'false'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  release-metadata:
    name: Compute Release Metadata
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      version_unprefixed: ${{ steps.meta.outputs.version_unprefixed }}
      minor_version: ${{ steps.meta.outputs.minor_version }}
      minor_version_unprefixed: ${{ steps.meta.outputs.minor_version_unprefixed }}
      latest: ${{ steps.meta.outputs.latest }}
      is_rc: ${{ steps.meta.outputs.is_rc }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      display_name: ${{ steps.meta.outputs.display_name }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      bundle_dir: ${{ steps.meta.outputs.bundle_dir }}
      bundle_archive: ${{ steps.meta.outputs.bundle_archive }}
      bundle_checksum: ${{ steps.meta.outputs.bundle_checksum }}
      release_name: ${{ steps.meta.outputs.release_name }}
      agent_image: ${{ steps.meta.outputs.agent_image }}
      cpu_agent_image: ${{ steps.meta.outputs.cpu_agent_image }}
      api_image: ${{ steps.meta.outputs.api_image }}
      cli_image: ${{ steps.meta.outputs.cli_image }}
      agent_binary_name: ${{ steps.meta.outputs.agent_binary_name }}
      api_binary_name: ${{ steps.meta.outputs.api_binary_name }}
      cli_binary_name: ${{ steps.meta.outputs.cli_binary_name }}
    steps:
      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          case "$VERSION" in
            bento-v*)
              DISPLAY_NAME="Bento"
              ARTIFACT_NAME="bento-binaries-linux-amd64"
              BUNDLE_DIR="bento-bundle"
              AGENT_IMAGE="bento-agent"
              CPU_AGENT_IMAGE="bento-agent-cpu"
              API_IMAGE="bento-rest-api"
              CLI_IMAGE="bento-cli"
              AGENT_BINARY_NAME="bento-agent"
              API_BINARY_NAME="bento-rest-api"
              CLI_BINARY_NAME="bento-cli"
              VERSION_UNPREFIXED="${VERSION#bento-}"
              ;;
            prover-v*)
              DISPLAY_NAME="Prover"
              ARTIFACT_NAME="prover-binaries-linux-amd64"
              BUNDLE_DIR="prover-bundle"
              AGENT_IMAGE="prover-agent"
              CPU_AGENT_IMAGE="prover-agent-cpu"
              API_IMAGE="prover-rest-api"
              CLI_IMAGE="prover-cli"
              AGENT_BINARY_NAME="prover-agent"
              API_BINARY_NAME="prover-rest-api"
              CLI_BINARY_NAME="prover-cli"
              VERSION_UNPREFIXED="${VERSION#prover-}"
              ;;
            *)
              echo "Unsupported release tag: $VERSION"
              exit 1
              ;;
          esac

          if [[ "$VERSION" == *"-rc."* ]]; then
            IS_RC="true"
            MINOR_VERSION=""
            MINOR_VERSION_UNPREFIXED=""
            LATEST=""
          else
            IS_RC="false"
            MINOR_VERSION="$(echo "$VERSION" | sed 's/\.[0-9]*$//')"
            MINOR_VERSION_UNPREFIXED="$(echo "$VERSION_UNPREFIXED" | sed 's/\.[0-9]*$//')"
            LATEST="latest"
          fi

          echo "VERSION=$VERSION"
          echo "VERSION_UNPREFIXED=$VERSION_UNPREFIXED"
          echo "IS_RC=$IS_RC"
          echo "MINOR_VERSION=$MINOR_VERSION"
          echo "LATEST=$LATEST"

          BUNDLE_ARCHIVE="${BUNDLE_DIR}-linux-amd64.tar.gz"
          BUNDLE_CHECKSUM="${BUNDLE_ARCHIVE}.sha256"
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_unprefixed=$VERSION_UNPREFIXED" >> "$GITHUB_OUTPUT"
          echo "minor_version=$MINOR_VERSION" >> "$GITHUB_OUTPUT"
          echo "minor_version_unprefixed=$MINOR_VERSION_UNPREFIXED" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "is_rc=$IS_RC" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "display_name=$DISPLAY_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "bundle_dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
          echo "bundle_archive=$BUNDLE_ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "bundle_checksum=$BUNDLE_CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "release_name=$DISPLAY_NAME Release $VERSION" >> "$GITHUB_OUTPUT"
          echo "agent_image=$AGENT_IMAGE" >> "$GITHUB_OUTPUT"
          echo "cpu_agent_image=$CPU_AGENT_IMAGE" >> "$GITHUB_OUTPUT"
          echo "api_image=$API_IMAGE" >> "$GITHUB_OUTPUT"
          echo "cli_image=$CLI_IMAGE" >> "$GITHUB_OUTPUT"
          echo "agent_binary_name=$AGENT_BINARY_NAME" >> "$GITHUB_OUTPUT"
          echo "api_binary_name=$API_BINARY_NAME" >> "$GITHUB_OUTPUT"
          echo "cli_binary_name=$CLI_BINARY_NAME" >> "$GITHUB_OUTPUT"

  extract-binaries:
    needs: release-metadata
    name: Extract Binaries from Docker Images
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Docker Services workflow to complete
        run: |
          echo "Waiting for docker-services workflow to push nightly-${{ needs.release-metadata.outputs.short_sha }} images..."
          SHORT_SHA=${{ needs.release-metadata.outputs.short_sha }}
          IMAGE=${{ env.IMAGE_PREFIX }}/${{ needs.release-metadata.outputs.agent_image }}:nightly-${SHORT_SHA}
          for i in $(seq 1 60); do
            if docker pull "$IMAGE" > /dev/null 2>&1; then
              echo "Image $IMAGE is available"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Timed out waiting for $IMAGE"
              exit 1
            fi
            echo "Attempt $i/60: Image not yet available, waiting 30s..."
            sleep 30
          done

      - name: Extract binaries from Docker images
        run: |
          SHORT_SHA=${{ needs.release-metadata.outputs.short_sha }}
          BUNDLE_DIR=${{ needs.release-metadata.outputs.bundle_dir }}
          mkdir -p "$BUNDLE_DIR"

          # Extract agent binary from GPU agent image (already pulled above)
          docker create --name tmp-agent ${{ env.IMAGE_PREFIX }}/${{ needs.release-metadata.outputs.agent_image }}:nightly-${SHORT_SHA}
          docker cp tmp-agent:/app/agent "$BUNDLE_DIR/${{ needs.release-metadata.outputs.agent_binary_name }}"
          docker rm tmp-agent

          # Extract rest_api binary
          docker pull ${{ env.IMAGE_PREFIX }}/${{ needs.release-metadata.outputs.api_image }}:nightly-${SHORT_SHA}
          docker create --name tmp-rest-api ${{ env.IMAGE_PREFIX }}/${{ needs.release-metadata.outputs.api_image }}:nightly-${SHORT_SHA}
          docker cp tmp-rest-api:/app/rest_api "$BUNDLE_DIR/${{ needs.release-metadata.outputs.api_binary_name }}"
          docker rm tmp-rest-api

          # Extract CLI binary
          docker pull ${{ env.IMAGE_PREFIX }}/${{ needs.release-metadata.outputs.cli_image }}:nightly-${SHORT_SHA}
          docker create --name tmp-cli ${{ env.IMAGE_PREFIX }}/${{ needs.release-metadata.outputs.cli_image }}:nightly-${SHORT_SHA}
          docker cp tmp-cli:/app/bento_cli "$BUNDLE_DIR/${{ needs.release-metadata.outputs.cli_binary_name }}"
          docker rm tmp-cli

          # Create bundle archive
          tar -czf "${{ needs.release-metadata.outputs.bundle_archive }}" "$BUNDLE_DIR/"
          sha256sum "${{ needs.release-metadata.outputs.bundle_archive }}" > "${{ needs.release-metadata.outputs.bundle_checksum }}"
          rm -rf "$BUNDLE_DIR/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.release-metadata.outputs.artifact_name }}
          path: |
            ${{ needs.release-metadata.outputs.bundle_archive }}
            ${{ needs.release-metadata.outputs.bundle_checksum }}
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [release-metadata, extract-binaries]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/bento-v') || startsWith(github.ref, 'refs/tags/prover-v')) && github.event.inputs.dry_run != 'true'
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: write

    steps:
      - name: Install gh CLI
        run: |
          if ! command -v gh > /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y gh
          fi
          gh --version

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.release-metadata.outputs.artifact_name }}
          path: release-assets

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-metadata.outputs.version }}"
          PRERELEASE_FLAG=""
          if [[ "${{ needs.release-metadata.outputs.is_rc }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          cat <<'EOF' > release-notes.md
          ## ${{ needs.release-metadata.outputs.display_name }} Components Release

          This release includes a complete bundle of ${{ needs.release-metadata.outputs.display_name }} components:
          - **${{ needs.release-metadata.outputs.agent_binary_name }}**: Workflow execution agent
          - **${{ needs.release-metadata.outputs.api_binary_name }}**: REST API server
          - **${{ needs.release-metadata.outputs.cli_binary_name }}**: CLI tool

          ### Supported Platforms
          - Linux AMD64

          ### Installation
          Download the appropriate bundle for your platform and extract:
          ```bash
          tar -xzf ${{ needs.release-metadata.outputs.bundle_archive }}
          cd ${{ needs.release-metadata.outputs.bundle_dir }}
          chmod +x ${{ needs.release-metadata.outputs.agent_binary_name }} ${{ needs.release-metadata.outputs.api_binary_name }} ${{ needs.release-metadata.outputs.cli_binary_name }}
          ```

          ### Verification
          Verify the integrity of downloaded bundles using the provided SHA256 checksums.
          EOF

          gh release create "$VERSION" \
            $PRERELEASE_FLAG \
            --title "${{ needs.release-metadata.outputs.release_name }}" \
            --notes-file release-notes.md \
            ./release-assets/*

  retag-docker:
    name: Retag Docker Images
    needs: [release-metadata, create-release]
    runs-on: [ self-hosted, prod, "Linux", "cpu" ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Retag agent image
        run: |
          SRC=ghcr.io/${{ github.repository }}/${{ needs.release-metadata.outputs.agent_image }}:nightly-${{ needs.release-metadata.outputs.short_sha }}
          for TAG in \
            "${{ needs.release-metadata.outputs.version }}" \
            "${{ needs.release-metadata.outputs.version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.minor_version }}" \
            "${{ needs.release-metadata.outputs.minor_version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.latest }}"; do
            if [ -n "$TAG" ]; then crane tag "$SRC" "$TAG"; fi
          done

      - name: Retag cpu agent image
        run: |
          SRC=ghcr.io/${{ github.repository }}/${{ needs.release-metadata.outputs.cpu_agent_image }}:nightly-${{ needs.release-metadata.outputs.short_sha }}
          for TAG in \
            "${{ needs.release-metadata.outputs.version }}" \
            "${{ needs.release-metadata.outputs.version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.minor_version }}" \
            "${{ needs.release-metadata.outputs.minor_version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.latest }}"; do
            if [ -n "$TAG" ]; then crane tag "$SRC" "$TAG"; fi
          done

      - name: Retag rest api image
        run: |
          SRC=ghcr.io/${{ github.repository }}/${{ needs.release-metadata.outputs.api_image }}:nightly-${{ needs.release-metadata.outputs.short_sha }}
          for TAG in \
            "${{ needs.release-metadata.outputs.version }}" \
            "${{ needs.release-metadata.outputs.version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.minor_version }}" \
            "${{ needs.release-metadata.outputs.minor_version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.latest }}"; do
            if [ -n "$TAG" ]; then crane tag "$SRC" "$TAG"; fi
          done

      - name: Retag cli image
        run: |
          SRC=ghcr.io/${{ github.repository }}/${{ needs.release-metadata.outputs.cli_image }}:nightly-${{ needs.release-metadata.outputs.short_sha }}
          for TAG in \
            "${{ needs.release-metadata.outputs.version }}" \
            "${{ needs.release-metadata.outputs.version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.minor_version }}" \
            "${{ needs.release-metadata.outputs.minor_version_unprefixed }}" \
            "${{ needs.release-metadata.outputs.latest }}"; do
            if [ -n "$TAG" ]; then crane tag "$SRC" "$TAG"; fi
          done
