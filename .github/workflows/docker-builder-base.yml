name: Docker Builder Base

on:
  push:
    branches: [main]
    paths:
      - "dockerfiles/builder-base.dockerfile"
      - "rust-toolchain.toml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/builder-base

jobs:
  build-base:
    runs-on: [self-hosted, prod, Linux, cpu]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push builder-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/builder-base.dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          secrets: |
            githubTokenSecret=${{ secrets.GITHUB_TOKEN }}
