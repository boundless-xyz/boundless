[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["../../lib", "../../contracts/src"]
script = "contracts/scripts"
test = "contracts/test"
ffi = true
# Match the root contracts config: BoundlessRouter and friends require the
# IR pipeline + optimizer to compile without "Stack too deep".
via_ir = true
optimizer = true
optimizer_runs = 100

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"

[lint]
lint_on_build = false
